# Flow Matching training on Brain GBM dataset
# Usage:
#   python run_fm_mri.py --config configs/experiment/train_fm_gbm.yaml
#   python run_fm_mri.py --config configs/experiment/train_fm_gbm.yaml --lr 5e-5

# Training configuration
training:
  epochs: 350
  batch_size: 4
  lr: 0.0001
  weight_decay: 0.000000000001
  warmup: 25
  num_workers: 8
  seed: 42
  enable_progress_bar: true

# Hardware
hardware:
  gpus: 1
  use_fp16: false
  precision: "medium"
  use_checkpoint: false

# Logging
logging:
  enable: true
  project_name: "FM-MRI-AE"
  log_dir: "logs"

# Checkpointing
checkpoint:
  resume_ckpt: null
  test_ckpt: null
  save_results: false

# Autoencoder model (frozen, used for encoding)
model:
  image_size: [256, 256]
  in_channels: 1
  num_channels: 64
  num_res_blocks: 1
  channel_mult: [2, 4, 4, 4, 4, 4, 4]
  resblock_updown: true
  attention_resolutions: "64,32,16,8,4,2,1"
  num_heads: 8
  num_head_channels: 16
  num_heads_upsample: -1
  use_new_attention_order: true
  use_scale_shift_norm: true
  dropout: 0.0
  learn_sigma: false
  num_classes: null
  use_skip_connection: false
  use_time_embed: false

# Flow Matching model
flow_matching:
  velocity_net: "vrf"
  dim: 4096
  w: 4096
  depth: 7
  memory: 1

  # Loss configuration
  loss_fn: "mse"
  clip: null

  # Flow matching configuration
  implementation: "SDE"
  interpolation: "exact"
  s_diffusion: 4.0
  sigma_scheduler: "adaptive4-4.0-0.0001"
  sde_noise: 0.1
  learned_time_scaling: true
  deriv_mix_coeff: 0.1

  # Data parametrization
  data_parametrization: false
  max_time: null
  train_sampling: "contiguous"
  max_slice_per_patient: 50

  # Conditioning
  class_conditional: false
  demographic_cond: true
  treatment_cond: 0
  time_prediction: false

  # Uncertainty estimation
  noise_prediction: true
  uncertainty_method: "direct"

  # Consistency regularization
  consistency_alpha: 0.80
  consistency_weight: 0
  delta_t: 0.005
  boundary_threshold: 0.0005
  use_ema: true
  ema_decay: 0.999
  snap_to_boundaries: true

# Dataset configuration
dataset:
  name: "brain_gbm"
  dataset_path: "/ivi/zfs/s0/original_homes/mislam/ImageFlowNet/data/brain_LUMIERE"
  image_folder: "LUMIERE_images_tumor250px_256x256"
  train_val_test_ratio: "8.0:1.0:1.0"
  use_only_pathological_case: true

# Segmentation model
segmentor:
  ckpt: "/projects/0/prjs1289/ImageFlowNet/checkpoints/gbm_trained_3_15_250_minOne.pty"
