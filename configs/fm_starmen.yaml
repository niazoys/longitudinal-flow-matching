# Flow Matching training on Starmen (synthetic) dataset
# Usage:
#   python run_fm_starmen.py --config configs/experiment/train_fm_starmen.yaml
#   python run_fm_starmen.py --config configs/experiment/train_fm_starmen.yaml --lr 5e-5

# Training configuration
training:
  epochs: 1200
  batch_size: 48
  lr: 0.0001
  weight_decay: 0.000000000001
  warmup: 25
  num_workers: 24
  seed: 41
  enable_progress_bar: true

# Hardware
hardware:
  gpus: 1
  use_fp16: false
  precision: "medium"
  use_checkpoint: false

# Logging
logging:
  enable: true
  project_name: "FM-Starmen"
  log_dir: "logs"

# Checkpointing
checkpoint:
  resume_ckpt: null
  test_ckpt: null
  save_results: false

# Autoencoder model (frozen, used for encoding)
model:
  image_size: [256, 256]
  in_channels: 1
  num_channels: 32
  num_res_blocks: 1
  channel_mult: [1, 1, 2, 2, 2, 4, 8]
  resblock_updown: true
  attention_resolutions: "64,32,16,8,4,2,1"
  num_heads: 8
  num_head_channels: 16
  num_heads_upsample: -1
  use_new_attention_order: true
  use_scale_shift_norm: true
  dropout: 0.0
  learn_sigma: false
  num_classes: null
  use_skip_connection: false
  use_time_embed: false

# Flow Matching model
flow_matching:
  velocity_net: "vrf"
  dim: 256
  w: 256
  depth: 4
  memory: 1

  # Loss configuration
  loss_fn: "mse"
  combined_loss: false
  clip: null

  # Flow matching configuration
  implementation: "SDE"
  interpolation: "exact"
  s_diffusion: 2.0
  sigma_scheduler: "adaptive4-2.0-0.0001"
  sde_noise: 0.1
  learned_time_scaling: false
  deriv_mix_coeff: 0.2
  time_multiplier: 1

  # Data parametrization
  data_parametrization: false
  max_time: 1
  train_sampling: "contiguous"

  # Conditioning
  class_conditional: false
  demographic_cond: false
  treatment_cond: 0
  time_prediction: false

  # Uncertainty estimation
  noise_prediction: true
  uncertainty_method: "direct"

# Dataset configuration
dataset:
  name: "starmen"
  dataset_path: "/ivi/zfs/s0/original_homes/mislam/ImageFlowNet/data/starmen"
  image_folder: "starmen_images"
  n_sequences: 10

# Segmentation model
segmentor:
  ckpt: null
